<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ahlak Pusulası: İnteraktif Nefs Muhasebesi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #111827; /* Fallback */
        background-image: 
          radial-gradient(circle at 1% 1%, rgba(6, 78, 59, 0.5) 0%, transparent 40%),
          radial-gradient(circle at 99% 99%, rgba(16, 185, 129, 0.4) 0%, transparent 35%),
          radial-gradient(circle at 50% 50%, rgba(13, 148, 136, 0.2) 0%, transparent 25%);
        background-size: 250% 250%;
        animation: subtle-gradient 25s ease-in-out infinite;
      }
      @keyframes subtle-gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      @keyframes fade-in-up {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        opacity: 0; /* Animasyon başlamadan önce gizli */
        animation: fade-in-up 0.7s ease-out forwards;
      }
      @keyframes fade-in {
        from { opacity: 0; transform: scale(0.98); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-fade-in {
        animation: fade-in 0.5s ease-out forwards;
      }
      
      .card-glow-border::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 0.5rem; /* rounded-lg */
        padding: 2px; /* border width */
        background: conic-gradient(from 180deg at 50% 50%, rgba(16, 185, 129, 0), rgba(16, 185, 129, 0.8), rgba(16, 185, 129, 0));
        -webkit-mask: 
          linear-gradient(#fff 0 0) content-box, 
          linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0;
        transition: opacity 0.4s ease-in-out;
      }
      .group:hover .card-glow-border::before {
        opacity: 1;
      }

    </style>
  <script type="importmap">
